# Active models to train and evaluate in the pipeline
models_to_train:
  - LogisticRegression
  - SVM
  - MultinomialNB
  - RidgeClassifier
  - XGBoost
  - GlobalPoolingFFN
  - DistilBERT

# Shared global configurations
random_state: 42
max_features: 15000

# Model-specific hyperparameters
LogisticRegression:
  C: 1.0
  solver: "lbfgs"
  max_iter: 50

SVM:
  C: 1.0
  loss: "squared_hinge"
  max_iter: 1000

MultinomialNB:
  alpha: 1.0

RidgeClassifier:
  alpha: 1.0

XGBoost:
  n_estimators: 50
  max_depth: 4
  learning_rate: 0.1

GlobalPoolingFFN:
  epochs: 1
  batch_size: 64
  learning_rate: 0.001
  embedding_dim: 128
  max_len: 128

DistilBERT:
  epochs: 1
  batch_size: 32
  learning_rate: 0.00002
  max_len: 128
