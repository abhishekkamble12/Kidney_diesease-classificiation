
services:
  db:
    image: postgres:15-alpine
    container_name: tweet_sentiment_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: tweet_sentiment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tweet_sentiment"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: tweet_sentiment_web
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
