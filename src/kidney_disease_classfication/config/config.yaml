project_name: "mlProject"
version: "1.0.0"
environment: "development"

# data ingestion 
data_ingestion :
  root_dir: artifacts/data_ingestion
  source_URL: Kidney_diesease-classificiation/dataset/thoroughly_cleaned_data.csv
  local_data_file: kidney_disease.csv
  unzip_dir: artifacts/data_ingestion 
  source_type : url 

# data transformation :
data_transformation:
  root_dir: artifacts/data_transformation
  train_data_path: artifacts/data_transformation/train.csv
  test_data_path: artifacts/data_transformation/test.csv
  preprocessed_object_file: artifacts/data_transformation/preprocessor.pkl
  test_size: 0.20
  random_state: 42

# model trainer :
model_trainer:
  root_dir: artifacts/model_trainer
  trained_model_path: artifacts/model_trainer/model.pkl

# model evaluation :
model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_transformation/test.csv
  model_path: artifacts/model_trainer/model.pkl
  metrics_file: artifacts/model_evaluation/metrics.json
  threshold: 0.75                           # Minimum acceptable F1 score
  stage: "Production"

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.01
  early_stopping_patience: 10
  seed: 42

artifacts_root: artifacts
logs_dir: artifacts/logs
