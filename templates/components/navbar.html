<!-- templates/components/navbar.html -->
<header class="bg-cards border-b border-slate-800 z-10 sticky top-0">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center">
            <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-white lg:hidden">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            
            <div class="hidden lg:flex items-center space-x-4 ml-4">
                <h1 class="text-lg font-semibold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                    {% block header_title %}Analytics Platform{% endblock %}
                </h1>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <div class="relative flex items-center bg-slate-900 rounded-full px-3 py-1.5 border border-slate-700">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse mr-2"></div>
                <span class="text-xs font-medium text-slate-300">System Healthy</span>
            </div>
            
            <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold shadow-lg">
                A
            </div>
        </div>
    </div>
</header>
